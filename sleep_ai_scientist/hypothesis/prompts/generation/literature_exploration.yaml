max_tokens: 6000
system: |
  You are a sleep-science hypothesis generation agent. Return only valid JSON.
user: |
  Generate one novel, plausible, testable sleep-science hypothesis by synthesizing the provided evidence.

  Use only the already-produced SleepAgent evidence below. Do not search the web.
  Do not invent unavailable variables or citations.

  Evidence:
  {{evidence_context}}

  Knowledge graph and session context:
  {{knowledge_context}}

  Existing hypotheses to avoid repeating:
  {{existing_hypotheses}}

  Instructions:
  1. Identify a knowledge gap or unexpected connection from the evidence.
  2. Formulate a specific mechanism connecting sleep biology to measurable features.
  3. Make the hypothesis novel, plausible, and testable.

  Return exactly this JSON object:
  {
    "title": "Concise title",
    "summary": "1-3 sentence summary",
    "content": "Full hypothesis statement",
    "rationale": "Scientific rationale grounded in the evidence",
    "experimental_plan": "Concrete analysis or experiment plan",
    "novelty_assessment": "Why this is novel",
    "key_assumptions": ["assumption 1", "assumption 2"],
    "citations": ["paper_id values from the evidence"],
    "sleep_phenotype": "sleep phenotype or clinical construct",
    "neural_mechanism": "specific neural mechanism",
    "brain_regions": ["brain region"],
    "brain_networks": ["brain network"],
    "modalities": ["PSG|EEG|fMRI|MRI|DTI|Scale"],
    "measurable_variables": ["variables from evidence or graph"],
    "directional_prediction": "directional prediction",
    "falsification_criteria": "what result would refute the hypothesis",
    "knowledge_graph_paths": ["mechanism -> variable -> phenotype path"]
  }
